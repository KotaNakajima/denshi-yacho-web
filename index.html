<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<meta name="theme-color" content="#0b3d2e" />
<title>電子野帳</title>
<style>
  :root { --fg:#111; --bg:#fff; --accent:#0b3d2e; --warn:#b00020; --line:#bbb; }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html,body { margin:0; padding:0; background:var(--bg); color:var(--fg);
    font-family: system-ui, "Hiragino Sans", "Noto Sans JP", sans-serif; font-size:18px; }
  header { background:var(--accent); color:#fff; padding:10px 12px; display:flex; align-items:center; gap:10px; position:sticky; top:0; z-index:5; }
  header h1 { font-size:18px; margin:0; flex:1; }
  header button { background:#ffffff22; color:#fff; border:1px solid #ffffff55; border-radius:8px; padding:8px 10px; font-size:16px; }
  #status { font-size:13px; opacity:.9; max-width:42vw; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .pick { display:flex; flex-wrap:wrap; gap:8px; padding:8px 12px; border-bottom:1px solid var(--line); align-items:center; }
  .pick select { flex:1 1 30%; min-height:48px; font-size:16px; border:2px solid var(--line); border-radius:10px; padding:6px; background:#fff; }
  .pick label { font-size:13px; color:#555; flex-basis:100%; margin-bottom:-4px; }
  .bar { display:flex; flex-wrap:wrap; gap:8px; padding:10px 12px; border-bottom:2px solid var(--line); position:sticky; top:46px; background:var(--bg); z-index:4; }
  .bar button { flex:1 1 auto; min-height:56px; font-size:18px; font-weight:600; border-radius:12px; border:2px solid var(--accent); background:#fff; color:var(--accent); }
  #micBtn { flex:2 1 160px; }
  #micBtn:disabled { opacity:.4; }
  #micBtn.listening { background:var(--accent); color:#fff; animation:pulse 1.2s infinite; }
  @keyframes pulse { 0%{opacity:1} 50%{opacity:.7} 100%{opacity:1} }
  .toggle { display:flex; align-items:center; gap:6px; flex:1 1 auto; font-size:15px; border:2px solid var(--line); border-radius:12px; padding:0 10px; min-height:56px; justify-content:center; }
  .toggle input { width:24px; height:24px; }
  #live { padding:10px 12px; min-height:44px; font-size:20px; color:#333; background:#f4f7f5; border-bottom:1px solid var(--line); }
  #live .interim { color:#888; }
  #pending { padding:10px 12px; display:none; gap:8px; border-bottom:1px solid var(--line); }
  #pending textarea { width:100%; font-size:18px; padding:8px; border:2px solid var(--line); border-radius:8px; min-height:56px; }
  #warnings { padding:6px 12px; color:var(--warn); font-size:15px; }
  .tableWrap { overflow:auto; padding:0 0 120px; }
  table { border-collapse:collapse; width:max-content; min-width:100%; }
  th,td { border:1px solid var(--line); padding:0; white-space:nowrap; }
  th { background:#eef2f0; font-size:14px; padding:8px 6px; position:sticky; top:0; }
  th.key { background:#d7e8df; }
  td input { border:none; width:100%; min-width:60px; padding:12px 8px; font-size:18px; background:transparent; }
  td.num input { text-align:right; }
  td.key input { font-weight:700; background:#f3f8f5; }
  td.bad input { background:#ffe3e3; color:var(--warn); font-weight:700; }
  tr.hit td { background:#fff8d6; }
  td.delcol { text-align:center; }
  .modal { position:fixed; inset:0; background:#0008; display:none; align-items:center; justify-content:center; z-index:20; }
  .modal.show { display:flex; }
  .card { background:#fff; border-radius:14px; padding:18px; width:92%; max-width:520px; max-height:88vh; overflow:auto; }
  .card h2 { margin-top:0; }
  .card label { display:block; margin:12px 0 4px; font-weight:600; }
  .card input { width:100%; font-size:16px; padding:10px; border:2px solid var(--line); border-radius:8px; }
  .card .row { display:flex; gap:8px; margin-top:16px; }
  .card .row button { flex:1; min-height:48px; font-size:16px; border-radius:10px; border:2px solid var(--accent); }
  .primary { background:var(--accent); color:#fff; }
  .ghost { background:#fff; color:var(--accent); }
  .hint { font-size:13px; color:#666; margin-top:4px; }
</style>
</head>
<body>
<header>
  <h1>電子野帳</h1>
  <span id="status">—</span>
  <button id="reloadBtn" title="再読込">⟳</button>
  <button id="settingsBtn" title="設定">⚙</button>
</header>

<!-- 起動時に毎回選ぶ：ファイル → タブ → キー列 -->
<div class="pick">
  <label>記入先（フォルダ内のスプレッドシート → シート → キー列）</label>
  <select id="fileSel"><option value="">ファイル選択…</option></select>
  <select id="tabSel"><option value="">シート…</option></select>
  <select id="keySel"><option value="">キー列…</option></select>
</div>

<div class="bar">
  <button id="micBtn" disabled>🎤 音声入力</button>
  <label class="toggle"><input type="checkbox" id="handsfree" checked> 自動記録</label>
  <button id="csvBtn">CSV</button>
</div>

<div id="live"><span id="finalTx"></span><span class="interim" id="interimTx"></span></div>

<div id="pending">
  <textarea id="pendingTx" placeholder="認識テキスト（手修正可）"></textarea>
  <button class="primary" id="recordBtn" style="min-height:52px;border-radius:10px;">この内容で記入</button>
</div>

<div id="warnings"></div>

<div class="tableWrap"><table id="grid"><thead></thead><tbody></tbody></table></div>

<div class="modal" id="settingsModal">
  <div class="card">
    <h2>設定</h2>
    <label>バックエンドURL（Apps Script /exec）</label>
    <input id="backendUrl" placeholder="https://script.google.com/macros/s/AKfy.../exec" />
    <div class="hint">Apps Scriptをウェブアプリとしてデプロイした /exec URL。</div>
    <label>共有トークン（任意・SHARED_TOKEN と一致）</label>
    <input id="token" placeholder="未設定なら空欄" />
    <label>有効にする大区分（カンマ区切り・空=全部）</label>
    <input id="cats" placeholder="例: 品種,形質" />
    <div class="hint" id="catsHint">辞書の大区分を選んで考慮範囲を個人ごとに絞れる。</div>
    <div class="row">
      <button class="ghost" id="cancelCfg">閉じる</button>
      <button class="primary" id="saveCfg">保存</button>
    </div>
  </div>
</div>

<script>
"use strict";
const LS = { url:'dy_backend_url', tok:'dy_token', cats:'dy_cats', file:'dy_file', tab:'dy_tab', key:'dy_key' };
let BACKEND = localStorage.getItem(LS.url) || '';
let TOKEN   = localStorage.getItem(LS.tok) || '';
let CATS    = localStorage.getItem(LS.cats) || '';
let FILE    = localStorage.getItem(LS.file) || '';
let TAB     = localStorage.getItem(LS.tab) || '';
let KEY     = localStorage.getItem(LS.key) || '';
let columns = [];        // [{key,label,type,unit,min,max}]
let rows    = [];        // [{row, values:{}}]
let AVAILABLE_CATS = [];

const $ = id => document.getElementById(id);
const setStatus = s => $('status').textContent = s;

/* ---------- JSONP（Apps Script CORS回避） ---------- */
function jsonp(params, timeoutMs=25000){
  return new Promise((resolve,reject)=>{
    if(!BACKEND) return reject(new Error('バックエンドURL未設定'));
    const cb='dy_cb_'+Date.now()+'_'+Math.floor(Math.random()*1e6);
    const q=Object.assign({},params,{callback:cb});
    if(TOKEN) q.token=TOKEN;
    const qs=Object.keys(q).map(k=>encodeURIComponent(k)+'='+encodeURIComponent(q[k])).join('&');
    const s=document.createElement('script');
    const timer=setTimeout(()=>{cleanup();reject(new Error('タイムアウト'));},timeoutMs);
    function cleanup(){clearTimeout(timer);delete window[cb];s.remove();}
    window[cb]=(d)=>{cleanup();resolve(d);};
    s.onerror=()=>{cleanup();reject(new Error('通信失敗'));};
    s.src=BACKEND+(BACKEND.indexOf('?')>=0?'&':'?')+qs;
    document.body.appendChild(s);
  });
}

/* ---------- 選択フロー: files → tabs → columns(keyCol) ---------- */
async function loadFiles(){
  if(!BACKEND){ setStatus('⚙設定でバックエンドURLを入力'); return; }
  setStatus('ファイル一覧取得中…');
  try{
    const r=await jsonp({action:'files'});
    if(!r.ok) throw new Error(r.error);
    const sel=$('fileSel'); sel.innerHTML='<option value="">ファイル選択…</option>';
    r.files.forEach(f=>{ const o=document.createElement('option'); o.value=f.id; o.textContent=f.name; sel.appendChild(o); });
    if(FILE){ sel.value=FILE; if(sel.value) await loadTabs(); }
    setStatus('ファイル選択待ち（'+r.files.length+'件）');
  }catch(e){ setStatus('一覧失敗:'+e.message); }
}
async function loadTabs(){
  FILE=$('fileSel').value; localStorage.setItem(LS.file,FILE);
  TAB=''; KEY=''; $('tabSel').innerHTML='<option value="">シート…</option>'; $('keySel').innerHTML='<option value="">キー列…</option>';
  columns=[]; rows=[]; renderHead(); renderRows(); updateMic();
  if(!FILE) return;
  setStatus('シート一覧取得中…');
  try{
    const r=await jsonp({action:'tabs',fileId:FILE});
    if(!r.ok) throw new Error(r.error);
    const sel=$('tabSel');
    r.tabs.forEach(t=>{ const o=document.createElement('option'); o.value=t; o.textContent=t; sel.appendChild(o); });
    const saved=localStorage.getItem(LS.tab);
    if(saved && r.tabs.indexOf(saved)>=0){ sel.value=saved; await loadColumns(); }
    else setStatus('シート選択待ち');
  }catch(e){ setStatus('シート取得失敗:'+e.message); }
}
async function loadColumns(){
  TAB=$('tabSel').value; localStorage.setItem(LS.tab,TAB);
  KEY=''; $('keySel').innerHTML='<option value="">キー列…</option>';
  if(!TAB){ updateMic(); return; }
  setStatus('列取得中…');
  try{
    const r=await jsonp({action:'rows',fileId:FILE,tab:TAB,limit:500});
    if(!r.ok) throw new Error(r.error);
    columns=r.columns||[]; rows=r.rows||[];
    const ksel=$('keySel');
    columns.forEach(c=>{ const o=document.createElement('option'); o.value=c.key; o.textContent=c.label; ksel.appendChild(o); });
    const savedKey=localStorage.getItem(LS.key);
    if(savedKey && columns.some(c=>c.key===savedKey)) ksel.value=savedKey;
    else { // キー列を推測（plot/id/プロット を含む列）
      const guess=columns.find(c=>/plot|id|プロット|区/i.test(c.key+c.label));
      if(guess) ksel.value=guess.key;
    }
    KEY=ksel.value; localStorage.setItem(LS.key,KEY);
    // カテゴリ取得（辞書区分）
    try{ const rc=await jsonp({action:'columns',fileId:FILE,tab:TAB}); AVAILABLE_CATS=rc.categories||[]; }catch(_){}
    renderHead(); renderRows(); updateMic();
    setStatus('準備OK '+rows.length+'行'+(KEY?(' / キー:'+KEY):' / キー列を選択'));
  }catch(e){ setStatus('列取得失敗:'+e.message); }
}
function onKeyChange(){ KEY=$('keySel').value; localStorage.setItem(LS.key,KEY); renderHead(); updateMic();
  setStatus(KEY?('キー列: '+KEY):'キー列を選択'); }

function updateMic(){ $('micBtn').disabled = !(FILE && TAB && KEY && recog); }

/* ---------- 描画 ---------- */
function colByKey(k){ return columns.find(c=>c.key===k); }
function isNum(c){ return c && (c.type==='number' || c.type==='auto'); }
function renderHead(){
  const tr=document.createElement('tr');
  columns.forEach(c=>{ const th=document.createElement('th');
    th.textContent=c.label+(c.unit?' ('+c.unit+')':''); if(c.key===KEY) th.className='key';
    tr.appendChild(th); });
  const thead=$('grid').tHead; thead.innerHTML=''; thead.appendChild(tr);
}
function validate(c,v){
  if(!c||c.type!=='number'||v===''||v==null) return true;
  const n=Number(v); if(isNaN(n)) return false;
  if(c.min!=null&&n<c.min) return false; if(c.max!=null&&n>c.max) return false; return true;
}
function renderRows(hitRows){
  const hits=new Set(hitRows||[]);
  const tb=$('grid').tBodies[0]||$('grid').createTBody(); tb.innerHTML='';
  rows.forEach((r)=>{
    const tr=document.createElement('tr'); if(hits.has(r.row)) tr.className='hit';
    columns.forEach(c=>{
      const td=document.createElement('td');
      if(isNum(c)&&c.type==='number') td.className='num';
      if(c.key===KEY) td.classList.add('key');
      const inp=document.createElement('input');
      inp.value=(r.values[c.key]==null?'':r.values[c.key]);
      if(c.type==='number') inp.inputMode='decimal';
      if(c.type==='number'&&!validate(c,inp.value)) td.classList.add('bad');
      inp.addEventListener('change',()=>onEdit(r,c,inp,td));
      td.appendChild(inp); tr.appendChild(td);
    });
    tb.appendChild(tr);
  });
}
function onEdit(r,c,inp,td){
  let v=inp.value.trim(); if(c.type==='number'&&v!=='') v=Number(v);
  r.values[c.key]=v; td.classList.toggle('bad', c.type==='number'&&!validate(c,inp.value));
  jsonp({action:'update',fileId:FILE,tab:TAB,row:r.row,key:c.key,value:v})
    .then(()=>setStatus('保存✓')).catch(e=>setStatus('保存失敗:'+e.message));
}

/* ---------- 穴埋め ---------- */
async function reloadRows(){
  if(!(FILE&&TAB)) return;
  try{ const r=await jsonp({action:'rows',fileId:FILE,tab:TAB,limit:500});
    if(r.ok){ columns=r.columns||columns; rows=r.rows||[]; renderHead(); renderRows(); setStatus('再読込✓ '+rows.length+'行'); }
  }catch(e){ setStatus('再読込失敗:'+e.message); }
}
async function sendTranscript(text){
  text=(text||'').trim(); if(!text) return;
  if(!(FILE&&TAB&&KEY)){ setStatus('ファイル/シート/キー列を選択してください'); return; }
  setStatus('解析中…');
  try{
    const r=await jsonp({action:'fill',fileId:FILE,tab:TAB,keyCol:KEY,transcript:text,cats:CATS});
    if(!r.ok){ setStatus('解析失敗:'+(r.error||'')); return; }
    const hit=[];
    (r.updates||[]).forEach(u=>{ const row=rows.find(x=>x.row===u.row);
      if(row){ Object.assign(row.values,u.written); hit.push(u.row); } });
    renderRows(hit);
    showWarnings(r.warnings||[]);
    const n=(r.updates||[]).length;
    setStatus(n?('記入✓ '+n+'行更新'):'該当行なし（warning確認）');
  }catch(e){ setStatus('通信失敗:'+e.message); }
}
function showWarnings(ws){ $('warnings').textContent = ws.length?('⚠ '+ws.join(' / ')):''; }

/* ---------- 音声認識 ---------- */
let recog=null, listening=false;
function initSpeech(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){ setStatus('音声認識非対応ブラウザ'); return; }
  recog=new SR(); recog.lang='ja-JP'; recog.continuous=true; recog.interimResults=true;
  recog.onresult=(e)=>{ let interim='',fin='';
    for(let i=e.resultIndex;i<e.results.length;i++){ const t=e.results[i][0].transcript;
      if(e.results[i].isFinal) fin+=t; else interim+=t; }
    $('interimTx').textContent=interim;
    if(fin){ $('finalTx').textContent=fin; $('interimTx').textContent='';
      if($('handsfree').checked) sendTranscript(fin);
      else { $('pending').style.display='flex'; $('pendingTx').value=fin; } }
  };
  recog.onerror=(e)=>setStatus('認識エラー:'+e.error);
  recog.onend=()=>{ if(listening){ try{recog.start();}catch(_){} } };
}
function toggleMic(){
  if(!recog) return;
  if(listening){ listening=false; recog.stop(); $('micBtn').classList.remove('listening'); $('micBtn').textContent='🎤 音声入力'; setStatus('停止'); }
  else { listening=true; try{recog.start();}catch(_){} $('micBtn').classList.add('listening'); $('micBtn').textContent='■ 停止'; setStatus('聞き取り中…'); }
}

/* ---------- CSV ---------- */
function exportCsv(){
  if(!columns.length) return;
  const head=columns.map(c=>c.label); const lines=[head.join(',')];
  rows.forEach(r=>{ lines.push(columns.map(c=>{ const v=r.values[c.key]; const s=(v==null?'':String(v));
    return /[",\n]/.test(s)?'"'+s.replace(/"/g,'""')+'"':s; }).join(',')); });
  const blob=new Blob(['﻿'+lines.join('\r\n')],{type:'text/csv'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download='yacho_'+new Date().toISOString().slice(0,19).replace(/[:T]/g,'-')+'.csv'; a.click(); URL.revokeObjectURL(a.href);
}

/* ---------- 設定 ---------- */
function openCfg(){ $('backendUrl').value=BACKEND; $('token').value=TOKEN; $('cats').value=CATS;
  if(AVAILABLE_CATS.length) $('catsHint').textContent='利用可能な大区分: '+AVAILABLE_CATS.join(', ')+'（空=全部）';
  $('settingsModal').classList.add('show'); }
function closeCfg(){ $('settingsModal').classList.remove('show'); }
async function saveCfg(){
  BACKEND=$('backendUrl').value.trim(); TOKEN=$('token').value.trim(); CATS=$('cats').value.trim();
  localStorage.setItem(LS.url,BACKEND); localStorage.setItem(LS.tok,TOKEN); localStorage.setItem(LS.cats,CATS);
  closeCfg(); await loadFiles();
}

/* ---------- 起動 ---------- */
$('micBtn').addEventListener('click',toggleMic);
$('reloadBtn').addEventListener('click',reloadRows);
$('settingsBtn').addEventListener('click',openCfg);
$('cancelCfg').addEventListener('click',closeCfg);
$('saveCfg').addEventListener('click',saveCfg);
$('csvBtn').addEventListener('click',exportCsv);
$('recordBtn').addEventListener('click',()=>{ sendTranscript($('pendingTx').value); $('pending').style.display='none'; });
$('fileSel').addEventListener('change',loadTabs);
$('tabSel').addEventListener('change',loadColumns);
$('keySel').addEventListener('change',onKeyChange);

initSpeech();
if(BACKEND) loadFiles(); else { setStatus('⚙設定からバックエンドURLを入力'); openCfg(); }
</script>
</body>
</html>

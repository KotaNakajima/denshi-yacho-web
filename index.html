<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<meta name="theme-color" content="#0b3d2e" />
<title>電子野帳</title>
<style>
  :root { --fg:#111; --bg:#fff; --accent:#0b3d2e; --warn:#b00020; --line:#bbb; }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html,body { margin:0; padding:0; background:var(--bg); color:var(--fg);
    font-family: system-ui, "Hiragino Sans", "Noto Sans JP", sans-serif; font-size:18px; }
  header { background:var(--accent); color:#fff; padding:10px 12px; display:flex; align-items:center; gap:10px; position:sticky; top:0; z-index:5; }
  header h1 { font-size:18px; margin:0; flex:1; }
  header button { background:#ffffff22; color:#fff; border:1px solid #ffffff55; border-radius:8px; padding:8px 10px; font-size:16px; }
  #status { font-size:13px; opacity:.9; max-width:42vw; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .pick { display:flex; flex-wrap:wrap; gap:8px; padding:8px 12px; border-bottom:1px solid var(--line); align-items:center; }
  .pick select { flex:1 1 30%; min-height:48px; font-size:16px; border:2px solid var(--line); border-radius:10px; padding:6px; background:#fff; }
  .pick label { font-size:13px; color:#555; flex-basis:100%; margin-bottom:-4px; }
  .bar { display:flex; flex-wrap:wrap; gap:8px; padding:10px 12px; border-bottom:2px solid var(--line); position:sticky; top:46px; background:var(--bg); z-index:4; }
  .bar button { flex:1 1 auto; min-height:56px; font-size:18px; font-weight:600; border-radius:12px; border:2px solid var(--accent); background:#fff; color:var(--accent); }
  #micBtn { flex:2 1 160px; }
  #micBtn:disabled { opacity:.4; }
  #micBtn.listening { background:var(--accent); color:#fff; animation:pulse 1.2s infinite; }
  @keyframes pulse { 0%{opacity:1} 50%{opacity:.7} 100%{opacity:1} }
  .toggle { display:flex; align-items:center; gap:6px; flex:1 1 auto; font-size:15px; border:2px solid var(--line); border-radius:12px; padding:0 10px; min-height:56px; justify-content:center; }
  .toggle input { width:24px; height:24px; }
  #live { padding:10px 12px; min-height:44px; font-size:20px; color:#333; background:#f4f7f5; border-bottom:1px solid var(--line); }
  #live .interim { color:#888; }
  #pending { padding:10px 12px; display:none; gap:8px; border-bottom:1px solid var(--line); }
  #pending textarea { width:100%; font-size:18px; padding:8px; border:2px solid var(--line); border-radius:8px; min-height:56px; }
  #warnings { padding:6px 12px; color:var(--warn); font-size:15px; }
  .tableWrap { overflow:auto; padding:0 0 120px; }
  table { border-collapse:separate; border-spacing:0; width:auto; }
  th,td { border-right:1px solid var(--line); border-bottom:1px solid var(--line); padding:0; white-space:nowrap; }
  /* ヘッダー行を縦スクロールで固定 */
  th { background:#eef2f0; font-size:19px; padding:8px 8px; position:sticky; top:0; z-index:2; text-align:center; }
  /* キー列(プロット名)を横スクロールで固定 */
  td.key { position:sticky; left:0; z-index:1; background:#f3f8f5; }
  th.key { background:#d7e8df; left:0; z-index:3; }  /* 左上の角: 縦横とも固定し最前面 */
  /* 列幅は内容に追従。文字は大きめ。input は ch 単位で各列ごとに指定（renderで width 設定） */
  td input { border:none; padding:11px 8px; font-size:26px; background:transparent; width:auto; min-width:3ch; }
  td.num input { text-align:right; }
  td.key input { font-weight:700; background:transparent; }
  td.bad input { background:#ffe3e3; color:var(--warn); font-weight:700; }
  tr.hit td { background:#fff8d6; }
  tr.hit td.key { background:#fdf3c4; }
  td.delcol { text-align:center; }
  /* 横向き(landscape)・低い画面高さ: 上部UIを薄くして表を広く */
  @media (orientation: landscape), (max-height: 480px) {
    html,body { font-size:16px; }
    header { padding:5px 10px; }
    header h1 { font-size:15px; }
    .pick { padding:5px 10px; gap:6px; }
    .pick label { flex-basis:auto; font-size:11px; margin:0 4px 0 0; }
    .pick select { flex:1 1 18%; min-height:38px; font-size:14px; }
    .bar { padding:6px 10px; gap:6px; top:38px; }
    .bar button, .toggle { min-height:42px; font-size:15px; }
    #live { padding:5px 10px; min-height:30px; font-size:16px; }
    .tableWrap { padding-bottom:70px; }
    th { font-size:18px; }
    td input { padding:8px 8px; font-size:24px; }
  }
  .modal { position:fixed; inset:0; background:#0008; display:none; align-items:center; justify-content:center; z-index:20; }
  .modal.show { display:flex; }
  .card { background:#fff; border-radius:14px; padding:18px; width:92%; max-width:520px; max-height:88vh; overflow:auto; }
  .card h2 { margin-top:0; }
  .card label { display:block; margin:12px 0 4px; font-weight:600; }
  .card input { width:100%; font-size:16px; padding:10px; border:2px solid var(--line); border-radius:8px; }
  .card .row { display:flex; gap:8px; margin-top:16px; }
  .card .row button { flex:1; min-height:48px; font-size:16px; border-radius:10px; border:2px solid var(--accent); }
  .primary { background:var(--accent); color:#fff; }
  .ghost { background:#fff; color:var(--accent); }
  .hint { font-size:13px; color:#666; margin-top:4px; }
  /* 高コントラスト(黒地・白大文字)テーマ: OLEDで消費電力・発熱を下げる。日陰(つばバイザー)前提で可読 */
  body.hc { background:#000; color:#fff; }
  body.hc header { background:#000; border-bottom:1px solid #444; }
  body.hc .pick, body.hc .bar, body.hc #live { background:#000; border-color:#444; color:#fff; }
  body.hc .pick select { background:#000; color:#fff; border-color:#666; }
  body.hc .bar button, body.hc .toggle { background:#000; color:#fff; border-color:#888; }
  body.hc #micBtn.listening { background:#fff; color:#000; }
  body.hc #live { color:#fff; } body.hc #live .interim { color:#aaa; }
  body.hc th { background:#111; color:#fff; }
  body.hc th.key { background:#1a2a20; }
  body.hc td input { color:#fff; }
  body.hc td.key { background:#0c0c0c; }
  body.hc td.key input { background:transparent; }
  body.hc tr.hit td { background:#3a3000; }
  body.hc tr.hit td.key { background:#332b00; }
  body.hc td.bad input { background:#5a0000; color:#ffb3b3; }
  body.hc th,body.hc td { border-color:#333; }
  #hcBtn.on { background:var(--accent); color:#fff; }
  body.hc #hcBtn.on { background:#fff; color:#000; }
</style>
</head>
<body>
<header>
  <h1>電子野帳</h1>
  <span id="status">—</span>
  <button id="hcBtn" title="高コントラスト(黒地・省電力)">🌓</button>
  <button id="reloadBtn" title="再読込">⟳</button>
  <button id="settingsBtn" title="設定">⚙</button>
</header>

<!-- 起動時に毎回選ぶ：テーマ(フォルダ) → ファイル → タブ → キー列 -->
<div class="pick">
  <label>記入先（研究テーマ → スプレッドシート → シート → キー列）</label>
  <select id="folderSel"><option value="">研究テーマ…</option></select>
  <select id="fileSel"><option value="">ファイル…</option></select>
  <select id="tabSel"><option value="">シート…</option></select>
  <select id="keySel"><option value="">キー列…</option></select>
</div>

<div class="bar">
  <button id="micBtn" disabled>🎤 押して話す</button>
  <label class="toggle"><input type="checkbox" id="handsfree" checked> 自動記録</label>
  <button id="csvBtn">CSV</button>
</div>

<div id="live"><span id="finalTx"></span><span class="interim" id="interimTx"></span></div>

<div id="pending">
  <textarea id="pendingTx" placeholder="認識テキスト（手修正可）"></textarea>
  <button class="primary" id="recordBtn" style="min-height:52px;border-radius:10px;">この内容で記入</button>
</div>

<div id="warnings"></div>

<div class="tableWrap"><table id="grid"><thead></thead><tbody></tbody></table></div>

<div class="modal" id="settingsModal">
  <div class="card">
    <h2>設定</h2>
    <label>バックエンドURL（Apps Script /exec）</label>
    <input id="backendUrl" placeholder="https://script.google.com/macros/s/AKfy.../exec" />
    <div class="hint">Apps Scriptをウェブアプリとしてデプロイした /exec URL。</div>
    <label>共有トークン（任意・SHARED_TOKEN と一致）</label>
    <input id="token" placeholder="未設定なら空欄" />
    <label>有効にする大区分（カンマ区切り・空=全部）</label>
    <input id="cats" placeholder="例: 品種,形質" />
    <div class="hint" id="catsHint">辞書の大区分を選んで考慮範囲を個人ごとに絞れる。</div>
    <div class="row">
      <button class="ghost" id="cancelCfg">閉じる</button>
      <button class="primary" id="saveCfg">保存</button>
    </div>
  </div>
</div>

<script>
"use strict";
const LS = { url:'dy_backend_url', tok:'dy_token', cats:'dy_cats', folder:'dy_folder', file:'dy_file', tab:'dy_tab', key:'dy_key', hc:'dy_hc' };
let BACKEND = localStorage.getItem(LS.url) || '';
let TOKEN   = localStorage.getItem(LS.tok) || '';
let CATS    = localStorage.getItem(LS.cats) || '';
let FOLDER  = localStorage.getItem(LS.folder) || '';
let FILE    = localStorage.getItem(LS.file) || '';
let TAB     = localStorage.getItem(LS.tab) || '';
let KEY     = localStorage.getItem(LS.key) || '';
let columns = [];        // [{key,label,type,unit,min,max}]
let rows    = [];        // [{row, values:{}}]
let AVAILABLE_CATS = [];

const $ = id => document.getElementById(id);
const setStatus = s => $('status').textContent = s;

/* ---------- JSONP（Apps Script CORS回避） ---------- */
function jsonp(params, timeoutMs=25000){
  return new Promise((resolve,reject)=>{
    if(!BACKEND) return reject(new Error('バックエンドURL未設定'));
    const cb='dy_cb_'+Date.now()+'_'+Math.floor(Math.random()*1e6);
    const q=Object.assign({},params,{callback:cb});
    if(TOKEN) q.token=TOKEN;
    const qs=Object.keys(q).map(k=>encodeURIComponent(k)+'='+encodeURIComponent(q[k])).join('&');
    const s=document.createElement('script');
    const timer=setTimeout(()=>{cleanup();reject(new Error('タイムアウト'));},timeoutMs);
    function cleanup(){clearTimeout(timer);delete window[cb];s.remove();}
    window[cb]=(d)=>{cleanup();resolve(d);};
    s.onerror=()=>{cleanup();reject(new Error('通信失敗'));};
    s.src=BACKEND+(BACKEND.indexOf('?')>=0?'&':'?')+qs;
    document.body.appendChild(s);
  });
}

/* ---------- 選択フロー: folders → files → tabs → columns(keyCol) ---------- */
async function loadFolders(){
  if(!BACKEND){ setStatus('⚙設定でバックエンドURLを入力'); return; }
  setStatus('研究テーマ取得中…');
  try{
    const r=await jsonp({action:'folders'});
    if(!r.ok) throw new Error(r.error);
    const sel=$('folderSel'); sel.innerHTML='<option value="">研究テーマ…</option>';
    (r.folders||[]).forEach(f=>{ const o=document.createElement('option'); o.value=f.id; o.textContent=f.name; sel.appendChild(o); });
    if((r.folders||[]).length===0){ // テーマ階層なし（FOLDER_ID未設定）→ 直接ファイル一覧
      sel.style.display='none'; await loadFiles(); return;
    }
    sel.style.display='';
    if(FOLDER){ sel.value=FOLDER; if(sel.value) await loadFiles(); }
    setStatus('研究テーマを選択（'+r.folders.length+'件）');
  }catch(e){ setStatus('テーマ取得失敗:'+e.message); }
}
async function loadFiles(){
  FOLDER=$('folderSel').value; localStorage.setItem(LS.folder,FOLDER);
  FILE=''; TAB=''; KEY='';
  $('fileSel').innerHTML='<option value="">ファイル…</option>';
  $('tabSel').innerHTML='<option value="">シート…</option>'; $('keySel').innerHTML='<option value="">キー列…</option>';
  columns=[]; rows=[]; renderHead(); renderRows(); updateMic();
  setStatus('ファイル一覧取得中…');
  try{
    const r=await jsonp({action:'files', folderId:FOLDER});
    if(!r.ok) throw new Error(r.error);
    const sel=$('fileSel'); sel.innerHTML='<option value="">ファイル…</option>';
    r.files.forEach(f=>{ const o=document.createElement('option'); o.value=f.id; o.textContent=f.name; sel.appendChild(o); });
    const saved=localStorage.getItem(LS.file);
    if(saved && r.files.some(f=>f.id===saved)){ sel.value=saved; await loadTabs(); }
    else setStatus('ファイルを選択（'+r.files.length+'件）');
  }catch(e){ setStatus('一覧失敗:'+e.message); }
}
async function loadTabs(){
  FILE=$('fileSel').value; localStorage.setItem(LS.file,FILE);
  TAB=''; KEY=''; $('tabSel').innerHTML='<option value="">シート…</option>'; $('keySel').innerHTML='<option value="">キー列…</option>';
  columns=[]; rows=[]; renderHead(); renderRows(); updateMic();
  if(!FILE) return;
  setStatus('シート一覧取得中…');
  try{
    const r=await jsonp({action:'tabs',fileId:FILE});
    if(!r.ok) throw new Error(r.error);
    const sel=$('tabSel');
    r.tabs.forEach(t=>{ const o=document.createElement('option'); o.value=t; o.textContent=t; sel.appendChild(o); });
    const saved=localStorage.getItem(LS.tab);
    if(saved && r.tabs.indexOf(saved)>=0){ sel.value=saved; await loadColumns(); }
    else setStatus('シート選択待ち');
  }catch(e){ setStatus('シート取得失敗:'+e.message); }
}
async function loadColumns(){
  TAB=$('tabSel').value; localStorage.setItem(LS.tab,TAB);
  KEY=''; $('keySel').innerHTML='<option value="">キー列…</option>';
  if(!TAB){ updateMic(); return; }
  setStatus('列取得中…');
  try{
    const r=await jsonp({action:'rows',fileId:FILE,tab:TAB,limit:500});
    if(!r.ok) throw new Error(r.error);
    columns=r.columns||[]; rows=r.rows||[];
    const ksel=$('keySel');
    columns.forEach(c=>{ const o=document.createElement('option'); o.value=c.key; o.textContent=c.label; ksel.appendChild(o); });
    const savedKey=localStorage.getItem(LS.key);
    if(savedKey && columns.some(c=>c.key===savedKey)) ksel.value=savedKey;
    else { // キー列を推測（plot/id/プロット を含む列）
      const guess=columns.find(c=>/plot|id|プロット|区/i.test(c.key+c.label));
      if(guess) ksel.value=guess.key;
    }
    KEY=ksel.value; localStorage.setItem(LS.key,KEY);
    // カテゴリ取得（辞書区分）
    try{ const rc=await jsonp({action:'columns',fileId:FILE,tab:TAB}); AVAILABLE_CATS=rc.categories||[]; }catch(_){}
    renderHead(); renderRows(); updateMic();
    setStatus('準備OK '+rows.length+'行'+(KEY?(' / キー:'+KEY):' / キー列を選択'));
  }catch(e){ setStatus('列取得失敗:'+e.message); }
}
function onKeyChange(){ KEY=$('keySel').value; localStorage.setItem(LS.key,KEY); renderHead(); updateMic();
  setStatus(KEY?('キー列: '+KEY):'キー列を選択'); }

function updateMic(){ $('micBtn').disabled = !(FILE && TAB && KEY && audioSupported()); }

/* ---------- 描画 ---------- */
function colByKey(k){ return columns.find(c=>c.key===k); }
function isNum(c){ return c && (c.type==='number' || c.type==='auto'); }
// 全角は約2文字幅で見積もる
function dispLen(s){ s=String(s==null?'':s); let n=0; for(const ch of s){ n+= (ch.charCodeAt(0)>0xFF?2:1); } return n; }
function colWidthCh(c){
  let w=dispLen(c.label)+(c.unit?dispLen(c.unit)+3:0);
  rows.forEach(r=>{ const v=r.values[c.key]; const l=dispLen(v); if(l>w) w=l; });
  return Math.max(3, Math.min(w+1, 24)); // 3..24ch にクランプ
}
function renderHead(){
  const tr=document.createElement('tr');
  columns.forEach(c=>{ const th=document.createElement('th');
    th.textContent=c.label+(c.unit?' ('+c.unit+')':''); if(c.key===KEY) th.className='key';
    tr.appendChild(th); });
  const thead=$('grid').tHead; thead.innerHTML=''; thead.appendChild(tr);
}
function validate(c,v){
  if(!c||c.type!=='number'||v===''||v==null) return true;
  const n=Number(v); if(isNaN(n)) return false;
  if(c.min!=null&&n<c.min) return false; if(c.max!=null&&n>c.max) return false; return true;
}
let lastWidths=[];
function renderRows(hitRows){
  const hits=new Set(hitRows||[]);
  const widths=columns.map(colWidthCh); lastWidths=widths;
  const tb=$('grid').tBodies[0]||$('grid').createTBody(); tb.innerHTML='';
  rows.forEach((r)=>{
    const tr=document.createElement('tr'); if(hits.has(r.row)) tr.className='hit';
    columns.forEach((c,ci)=>{
      const td=document.createElement('td');
      if(isNum(c)&&c.type==='number') td.className='num';
      if(c.key===KEY) td.classList.add('key');
      const inp=document.createElement('input');
      inp.value=(r.values[c.key]==null?'':r.values[c.key]);
      inp.size=widths[ci];                         // 列幅を内容に追従
      inp.style.width=widths[ci]+'ch';
      if(c.type==='number') inp.inputMode='decimal';
      if(c.type==='number'&&!validate(c,inp.value)) td.classList.add('bad');
      inp.addEventListener('change',()=>onEdit(r,c,inp,td));
      td.appendChild(inp); tr.appendChild(td);
    });
    tb.appendChild(tr);
  });
  requestAnimationFrame(()=>{ fitWidth(); scrollToHit(hitRows); });
}

/* 表が画面より狭ければ各列を比例拡大して幅いっぱいに（横向きで余白を埋める） */
function fitWidth(){
  const wrap=document.querySelector('.tableWrap'), tbl=$('grid');
  if(!wrap||!tbl||!columns.length||!lastWidths.length) return;
  // いったん基準幅へ戻す
  const trs=tbl.tBodies[0]?tbl.tBodies[0].rows:[];
  for(const tr of trs) Array.from(tr.cells).forEach((td,ci)=>{ const i=td.querySelector('input'); if(i) i.style.width=lastWidths[ci]+'ch'; });
  const natural=tbl.scrollWidth, avail=wrap.clientWidth;
  if(natural>0 && natural < avail-2){
    const ratio=avail/natural;
    for(const tr of trs) Array.from(tr.cells).forEach((td,ci)=>{ const i=td.querySelector('input'); if(i) i.style.width=(lastWidths[ci]*ratio)+'ch'; });
  }
}

/* 記入された行を画面内（縦中央）へスクロール。最初の更新セルは横にも寄せる */
function scrollToHit(hitRows){
  if(!hitRows||!hitRows.length) return;
  const body=$('grid').tBodies[0]; if(!body) return;
  const tr=Array.from(body.rows).find(r=>r.classList.contains('hit'));
  if(!tr) return;
  tr.scrollIntoView({behavior:'smooth', block:'center'});
  const filled=tr.querySelector('td.bad input') || Array.from(tr.cells).map(td=>td.querySelector('input')).find(i=>i&&i.value!=='');
  if(filled) filled.scrollIntoView({behavior:'smooth', inline:'center', block:'nearest'});
}

function onEdit(r,c,inp,td){
  let v=inp.value.trim(); if(c.type==='number'&&v!=='') v=Number(v);
  r.values[c.key]=v; td.classList.toggle('bad', c.type==='number'&&!validate(c,inp.value));
  jsonp({action:'update',fileId:FILE,tab:TAB,row:r.row,key:c.key,value:v})
    .then(()=>setStatus('保存✓')).catch(e=>setStatus('保存失敗:'+e.message));
}

/* ---------- 穴埋め ---------- */
async function reloadRows(){
  if(!(FILE&&TAB)) return;
  try{ const r=await jsonp({action:'rows',fileId:FILE,tab:TAB,limit:500});
    if(r.ok){ columns=r.columns||columns; rows=r.rows||[]; renderHead(); renderRows(); setStatus('再読込✓ '+rows.length+'行'); }
  }catch(e){ setStatus('再読込失敗:'+e.message); }
}
async function sendTranscript(text){
  text=(text||'').trim(); if(!text) return;
  if(!(FILE&&TAB&&KEY)){ setStatus('ファイル/シート/キー列を選択してください'); return; }
  setStatus('解析中…');
  try{
    const r=await jsonp({action:'fill',fileId:FILE,tab:TAB,keyCol:KEY,transcript:text,cats:CATS});
    if(!r.ok){ setStatus('解析失敗:'+(r.error||'')); return; }
    const hit=[];
    (r.updates||[]).forEach(u=>{ const row=rows.find(x=>x.row===u.row);
      if(row){ Object.assign(row.values,u.written); hit.push(u.row); } });
    renderRows(hit);
    showWarnings(r.warnings||[]);
    const n=(r.updates||[]).length;
    setStatus(n?('記入✓ '+n+'行更新'):'該当行なし（warning確認）');
  }catch(e){ setStatus('通信失敗:'+e.message); }
}
function showWarnings(ws){ $('warnings').textContent = ws.length?('⚠ '+ws.join(' / ')):''; }

/* ---------- 音声: 録音→Whisper(GAS経由)。頭切れ無し・専門用語精度↑ ---------- */
let mediaRec=null, chunks=[], audioStream=null, recording=false, recMime='audio/webm';
function audioSupported(){ return !!(navigator.mediaDevices && navigator.mediaDevices.getUserMedia && window.MediaRecorder); }
function initSpeech(){ if(!audioSupported()) setStatus('録音非対応ブラウザ'); }
async function ensureStream(){ if(!audioStream) audioStream=await navigator.mediaDevices.getUserMedia({audio:true}); return audioStream; }

async function toggleMic(){
  if(recording){ try{ mediaRec.stop(); }catch(_){} return; }       // 録音中タップ=停止→送信
  if(!(FILE&&TAB&&KEY)){ setStatus('ファイル/シート/キー列を選択'); return; }
  if(!audioSupported()){ setStatus('録音非対応ブラウザ'); return; }
  try{ await ensureStream(); }catch(e){ setStatus('マイク不可:'+e.message); return; }
  chunks=[]; showWarnings([]); $('finalTx').textContent=''; $('interimTx').textContent='';
  recMime = MediaRecorder.isTypeSupported('audio/webm;codecs=opus') ? 'audio/webm;codecs=opus'
          : (MediaRecorder.isTypeSupported('audio/mp4') ? 'audio/mp4' : 'audio/webm');
  try{ mediaRec=new MediaRecorder(audioStream,{mimeType:recMime}); }
  catch(_){ mediaRec=new MediaRecorder(audioStream); recMime=mediaRec.mimeType||'audio/webm'; }
  mediaRec.ondataavailable=ev=>{ if(ev.data&&ev.data.size) chunks.push(ev.data); };
  mediaRec.onstart=()=>{ recording=true; $('micBtn').classList.add('listening'); $('micBtn').textContent='🔴 録音中（押して停止）'; setStatus('🔴 録音中…話し終えたら停止'); requestWake(); };
  mediaRec.onstop=async ()=>{ recording=false; $('micBtn').classList.remove('listening'); $('micBtn').textContent='🎤 押して話す'; releaseWake();
    const blob=new Blob(chunks,{type:recMime}); await sttSend(blob); };
  mediaRec.start();
}

function blobToB64(blob){ return new Promise((res,rej)=>{ const fr=new FileReader(); fr.onload=()=>res(String(fr.result).split(',')[1]); fr.onerror=rej; fr.readAsDataURL(blob); }); }
function postJSON(obj){
  return fetch(BACKEND, {method:'POST', headers:{'Content-Type':'text/plain;charset=utf-8'},
    body:JSON.stringify(Object.assign({token:TOKEN},obj)), redirect:'follow'}).then(r=>r.json());
}
/* 送信キュー（数時間運用の保険）: 通信失敗した録音を貯めて自動リトライ。電波復帰で順次送信 */
let outbox=[];
function outboxCount(){ return outbox.length; }
function updateOutbox(){ const n=outboxCount(); if(n) setStatus('📥 未送信 '+n+'件（電波復帰で自動送信）'); }
function applyResult(r){
  $('finalTx').textContent=r.transcript||'';
  const hit=[]; (r.updates||[]).forEach(u=>{ const row=rows.find(x=>x.row===u.row); if(row){ Object.assign(row.values,u.written); hit.push(u.row); } });
  renderRows(hit); showWarnings(r.warnings||[]);
  setStatus((r.updates||[]).length?('記入✓ '+r.updates.length+'行'+(outboxCount()?(' / 未送信'+outboxCount()):'')):'該当行なし（warning確認）');
}
async function flushOutbox(){
  if(!outbox.length || !navigator.onLine) return;
  while(outbox.length){
    const job=outbox[0];
    try{
      const r=await postJSON(job);
      if(!r.ok) throw new Error(r.error||'');
      outbox.shift();
      if(job.apply==='1' && job.fileId===FILE && job.tab===TAB) applyResult(r);
    }catch(e){ updateOutbox(); return; }   // まだ繋がらない→次の機会に
  }
  setStatus('未送信を全て記入✓');
}
window.addEventListener('online', flushOutbox);
setInterval(()=>{ if(outbox.length) flushOutbox(); }, 20000);

async function sttSend(blob){
  if(!blob.size){ setStatus('録音が空でした'); return; }
  setStatus('認識中…');
  let b64; try{ b64=await blobToB64(blob); }catch(e){ setStatus('変換失敗'); return; }
  const job={action:'stt', audio:b64, mime:recMime, fileId:FILE, tab:TAB, keyCol:KEY, cats:CATS, apply:$('handsfree').checked?'1':'0'};
  try{
    const r=await postJSON(job);
    if(!r.ok){ setStatus('認識失敗:'+(r.error||'')); return; }   // サーバ応答エラーはキューしない(再送しても同じ)
    if(job.apply==='1') applyResult(r);
    else { $('finalTx').textContent=r.transcript||''; $('pending').style.display='flex'; $('pendingTx').value=r.transcript||''; setStatus('確認して記入'); }
    if(outbox.length) flushOutbox();
  }catch(e){
    // 通信失敗のみキューに退避（数時間運用で取りこぼさない）
    outbox.push(job); updateOutbox();
  }
}

/* Wake Lock: 録音中は画面を消さない */
let wakeLock=null;
async function requestWake(){ try{ if('wakeLock' in navigator) wakeLock=await navigator.wakeLock.request('screen'); }catch(_){} }
async function releaseWake(){ try{ if(wakeLock){ await wakeLock.release(); wakeLock=null; } }catch(_){} }
document.addEventListener('visibilitychange', ()=>{ if(document.visibilityState==='visible' && recording) requestWake(); });

/* 高コントラスト(黒地)トグル: OLEDで省電力・発熱低減。つけっぱOK */
function applyHC(on){ document.body.classList.toggle('hc', on); $('hcBtn').classList.toggle('on', on); localStorage.setItem(LS.hc, on?'1':''); }
function toggleHC(){ applyHC(!document.body.classList.contains('hc')); }

/* ---------- CSV ---------- */
function exportCsv(){
  if(!columns.length) return;
  const head=columns.map(c=>c.label); const lines=[head.join(',')];
  rows.forEach(r=>{ lines.push(columns.map(c=>{ const v=r.values[c.key]; const s=(v==null?'':String(v));
    return /[",\n]/.test(s)?'"'+s.replace(/"/g,'""')+'"':s; }).join(',')); });
  const blob=new Blob(['﻿'+lines.join('\r\n')],{type:'text/csv'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download='yacho_'+new Date().toISOString().slice(0,19).replace(/[:T]/g,'-')+'.csv'; a.click(); URL.revokeObjectURL(a.href);
}

/* ---------- 設定 ---------- */
function openCfg(){ $('backendUrl').value=BACKEND; $('token').value=TOKEN; $('cats').value=CATS;
  if(AVAILABLE_CATS.length) $('catsHint').textContent='利用可能な大区分: '+AVAILABLE_CATS.join(', ')+'（空=全部）';
  $('settingsModal').classList.add('show'); }
function closeCfg(){ $('settingsModal').classList.remove('show'); }
async function saveCfg(){
  BACKEND=$('backendUrl').value.trim(); TOKEN=$('token').value.trim(); CATS=$('cats').value.trim();
  localStorage.setItem(LS.url,BACKEND); localStorage.setItem(LS.tok,TOKEN); localStorage.setItem(LS.cats,CATS);
  closeCfg(); await loadFolders();
}

/* ---------- 起動 ---------- */
$('micBtn').addEventListener('click',toggleMic);
$('reloadBtn').addEventListener('click',reloadRows);
$('settingsBtn').addEventListener('click',openCfg);
$('cancelCfg').addEventListener('click',closeCfg);
$('saveCfg').addEventListener('click',saveCfg);
$('csvBtn').addEventListener('click',exportCsv);
$('recordBtn').addEventListener('click',()=>{ sendTranscript($('pendingTx').value); $('pending').style.display='none'; });
$('hcBtn').addEventListener('click',toggleHC);
$('folderSel').addEventListener('change',loadFiles);
$('fileSel').addEventListener('change',loadTabs);
$('tabSel').addEventListener('change',loadColumns);
$('keySel').addEventListener('change',onKeyChange);

window.addEventListener('resize', ()=>{ clearTimeout(window._fitT); window._fitT=setTimeout(fitWidth,150); });
window.addEventListener('orientationchange', ()=>setTimeout(fitWidth,300));

applyHC(localStorage.getItem(LS.hc)==='1');
initSpeech();
if(BACKEND) loadFolders(); else { setStatus('⚙設定からバックエンドURLを入力'); openCfg(); }
</script>
